spring.application.name=mySpringAi
# 可選匯入 src/main/resources/api.properties；目前用來載入 tavily.apiKey。
# optional 表示檔案不存在時不讓 Spring Boot 啟動失敗
spring.config.import=optional:classpath:api.properties
################ Log 相關設定 ################
# Log formate: green = 時間 / blue = log等級 / red = thread名稱 / yellow = log名稱 / white = log內容
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
# 如果有設定 LOG_FILE_NAME 環境變數，則使用該值作為日志文件的名稱；如果沒有設定，則預設為 ./logs/app.log
logging.file.name=${LOG_FILE_NAME:./logs/app.log}
# 開啟 PrettyLoggerAdvisor 與 SimpleLoggerAdvisor 的 DEBUG 等級日誌，用來觀察 ChatClient 的 prompt/response 流程。
logging.level.com.example.mySpringAi.advisor.PrettyLoggerAdvisor=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
################ LLM model OpenAI 設定 ################
# OpenAI api key
spring.ai.openai.api-key=${OPENAI_API_KEY:}
# OpenAI-model type
spring.ai.openai.chat.model=gpt-4.1-nano
################ LLM model Ollama 設定 ################
# Ollama-model type: spring.ai.ollama.base-url 預設是 http://localhost:11434 連到本機的 Ollama server
spring.ai.ollama.chat.model=llama3.2:1b
################ Spring AI 相關設定 ################
# 避免 Spring context 裡沒有 ChatClient.Builder bean → @ConditionalOnMissingBean 條件成立 → Spring AI 嘗試自動建立一個 → 注入 ChatModel 介面 → 看到兩個候選（OpenAI + Ollama）→ 啟動失敗。
# spring.ai.chat.client.enabled=false
################ H2 Database 相關設定 ################
# AUTO_SERVER=true 多個連線同時存取同一個 H2 檔案 Spring Boot app + H2 Console + DataGrip
spring.datasource.url=jdbc:h2:file:./h2db/chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 啟用 H2 Console
spring.h2.console.enabled=true
# 讓 Spring AI「自動執行內建 schema-h2.sql（或其他 dialect schema）」來建立資料表
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
################ Qdrant 相關設定 ################
# Spring Boot 關閉時使用 docker compose down，而不是預設 stop；
# 這會移除 Compose 建立的容器與網路，避免本機開發時殘留容器狀態。
spring.docker.compose.stop.command=down
# 若 Qdrant collection 不存在，讓 Spring AI 嘗試建立所需 schema / collection。
spring.ai.vectorstore.qdrant.initialize-schema=true
# Spring AI 連線到本機 Qdrant。
spring.ai.vectorstore.qdrant.host=localhost
# Qdrant gRPC port；Spring AI Qdrant Vector Store 使用 gRPC 連線。
spring.ai.vectorstore.qdrant.port=6334
# 預設自動配置的 QdrantVectorStore 使用 rag-collection。
# 注意：手動建立的 pdfVectorStore 另外使用 pdf-collection，不受此設定影響。
# 同一個 Qdrant server 可以有多個 collection；每個 collection 的向量維度必須符合使用的 EmbeddingModel。
# collection 類比資料庫的 table
spring.ai.vectorstore.qdrant.collection-name=rag-collection
################ Redis 相關設定 ################
# Jedis RedisClient 會讀取這兩個值，用來連到 Docker Compose 啟動的 Redis。
# 這只設定 Redis 連線位置，不會自動啟用 Spring AI Semantic Cache。
spring.data.redis.host=localhost
spring.data.redis.port=6379
################ JPA/Hibernate 相關設定 ################
# Hibernate 啟動時根據 JPA Entity 嘗試更新資料表結構；通常會保留既有資料，但不適合取代正式 migration。
spring.jpa.hibernate.ddl-auto=update
# MCP client 會啟動外部 process / 連線遠端 server；本機路徑未設定好時先關閉，避免整個 Spring context 啟動失敗。
spring.ai.mcp.client.enabled=false
# Stdio (標準輸入輸出) 模式: Spring Boot 會在後台直接啟動一個新的進程（Process），透過電腦內部的管道（Standard I/O）跟它說話。這通常用於你電腦本機安裝的工具。
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json
# SSE (Server-Sent Events) 模式 - 其中一個transport type 可能要comment for testing * AND IT HAS TO BE RUNNING FIRST
spring.ai.mcp.client.sse.connections.remoteMCP.url=http://localhost:8081
# both stdio + sse will be registered in ToolCallbackProvider
# 只允許透過 Web（HTTP）存取 health 與 metrics 這兩個 Actuator (health → 我還活著嗎？) endpoint (metrics → 我跑得好嗎？)
management.endpoints.web.exposure.include=health, metrics
